name: Package Desktop App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for manual builds. Leave empty to use build-<run-number>."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  GH_REPO: ${{ github.repository }}

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    outputs:
      tag_name: ${{ steps.release-meta.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve release tag
        id: release-meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_RELEASE_TAG"
            if [ -z "$tag" ]; then
              tag="build-${GITHUB_RUN_NUMBER}"
            fi
          else
            tag="$REF_NAME"
          fi

          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          echo "Repository: $GH_REPO"
          echo "Release tag: $TAG_NAME"

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release already exists."
          else
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "$TAG_NAME" \
              --notes "Automated desktop packages."
          fi

  linux:
    name: Linux x64 packages
    runs-on: ubuntu-22.04
    needs: prepare-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 rpm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and Electron entry
        run: npm run build

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage deb rpm --x64 --publish never

      - name: Upload Linux packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          shopt -s nullglob
          files=(release/*.AppImage release/*.deb release/*.rpm release/*.blockmap release/latest*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Linux package files found."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --repo "$GH_REPO" --clobber

  windows:
    name: Windows installers
    runs-on: windows-latest
    needs: prepare-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and Electron entry
        run: npm run build

      - name: Build Windows installers
        run: npx electron-builder --win nsis --x64 --ia32 --publish never

      - name: Upload Windows installers to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          $files = @(
            Get-ChildItem -Path release -Filter *.exe
            Get-ChildItem -Path release -Filter *.blockmap
            Get-ChildItem -Path release -Filter latest*.yml
          ) | Select-Object -ExpandProperty FullName -Unique
          if ($files.Count -eq 0) {
            Write-Error "No Windows installer files found."
            exit 1
          }

          gh release upload $env:TAG_NAME @files --repo $env:GH_REPO --clobber
